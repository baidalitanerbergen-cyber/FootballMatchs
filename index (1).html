<!DOCTYPE html>
<html lang="en">
    <head>
         <meta charset="UTF-8">
         <title>Football Match</title>
         <style>
         body{
           margin: 0;
           background: #1b1b1b;
           font-family: Arial, sans-serif;
          }
        .t{
           width: 420px;
           height: 260px;

           border: 5px solid white;

          }
        .s{
           width: 80px;
           height: 260px;
           border-right: 5px solid white;
           position: absolute;
           top: 0;
           left: 0;
           z-index: 5;
           text-align: center;
           line-height: 260px;
           font-size: 15px;
           font-weight: bold;
          }
        .i{
           width: 300px;
           height: 130px;
           margin-left: 95px;
           margin-top: 25px;
           font-size: 15px;
          }
        .r{
           height: 35px;
           margin-bottom: 10px;
          }
        span{
           font-weight: bold;
           margin-right: 10px;
          }
        .b{
           width: 100%;
           height: 40px;
           border-top: 5px solid white;
           position: absolute;
           left: 0;
           bottom: 0;
           text-align: center;
           line-height: 40px;
           font-size: 15px;
       }
       </style>
       </head>
       <body>

<div class="t">
    <div class="y">FOOTBALL MATCH</div>

    <div class="s">
      Last <br> 
      Dance  
    </div>

    <div class="i">
        <div class="r"><span>Time:</span>04.05.26 - 05:00 PM</div>
        <div class="r"><span>Place:</span>Football Field</div>

    </div>

    <div class="b">Everyone Is Invited!</div>
</div>

</body>
</html>
